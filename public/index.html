<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriBot AI</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://i.ibb.co.com/GvK3p41M/Nutri-Bot-Logo.png" alt="NutriBot AI Logo" class="logo"/>
      <div class="header-text">
        <h1>NutriBot AI</h1>
        <h2 class="tagline">Less effort. More Healthy</h2>
      </div>
    </div>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" required />
      <button type="submit">Send</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
